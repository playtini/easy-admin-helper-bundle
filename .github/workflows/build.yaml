name: Build
on:
    workflow_dispatch:
    push: { branches: [ 'main' ] }

concurrency:
    group: ci-${{ github.ref }}-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            -   name: checkout
                uses: actions/checkout@v6
                with: { fetch-depth: 1 }

            -   name: composer cache
                uses: actions/cache@v5
                with:
                    path: /tmp/composer-cache
                    key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

            -   name: composer
                uses: php-actions/composer@v6
                with:
                    dev: yes
                    php_version: '8.5'
                    memory_limit: '512M'
                    args: '--ignore-platform-reqs --no-ansi --no-scripts --no-progress -o'

            -   name: phpstan
                uses: php-actions/phpstan@v3
                with:
                    path: 'src/'
                    php_version: '8.5'
                    php_extensions: mbstring redis pdo_mysql bcmath
                    memory_limit: '512M'

            -   name: phpunit
                uses: php-actions/phpunit@v4
                with:
                    version: '13'
                    php_version: '8.5'
                    configuration: phpunit.xml.dist
                    coverage_text: true
                    memory_limit: '512M'
                    php_extensions: pcov mbstring redis pdo_mysql bcmath
                    args: --coverage-clover var/coverage/clover.xml --coverage-filter src
                env:
                    XDEBUG_MODE: coverage

            -   name: coverage gate
                run: php bin/coverage-check.php var/coverage/clover.xml 50

            -   name: composer
                uses: php-actions/composer@v6
                with:
                    dev: no
                    php_version: '8.5'
                    memory_limit: '512M'
                    args: '--ignore-platform-reqs --no-ansi --no-scripts --no-progress -o'

            -   uses: actions/upload-artifact@v7
                if: ${{ failure() }}
                with: { name: 'logs', path: 'var/log' }
